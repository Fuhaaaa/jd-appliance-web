name: Deploy H5 to FC

on:
  push:
    branches: [main]

  workflow_dispatch:  # 支持手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build H5
        run: npm run build:h5

      - name: Prepare FC deploy package
        run: |
          # 创建部署目录结构
          mkdir -p fc-deploy/public

          # 复制 FC 入口文件
          cp fc-entry/index.js fc-deploy/
          cp fc-entry/package.json fc-deploy/

          # 复制 H5 构建产物到 public 目录
          cp -r dist/h5/* fc-deploy/public/

          # 查看目录结构
          echo "=== FC deploy package ==="
          find fc-deploy -type f | head -20
          echo "..."
          echo "Total files: $(find fc-deploy -type f | wc -l)"

      - name: Package with adm-zip
        run: |
          npm install adm-zip
          node -e "
            const AdmZip = require('adm-zip');
            const zip = new AdmZip();
            zip.addLocalFolder('fc-deploy', '');
            zip.writeZip('fc-deploy-package.zip');
            console.log('ZIP created successfully');
            console.log('Size:', require('fs').statSync('fc-deploy-package.zip').size, 'bytes');
          "

      - name: Setup Alibaba Cloud CLI
        run: |
          curl -fsSL https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz | tar xz
          sudo mv aliyun /usr/local/bin/

      - name: Deploy to FC 3.0
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_REGION: ${{ secrets.ALIYUN_REGION }}
          FC_FUNCTION_NAME: ${{ secrets.FC_FUNCTION_NAME }}
        run: |
          # 配置阿里云 CLI
          aliyun configure set \
            --mode AK \
            --access-key-id "$ALIYUN_ACCESS_KEY_ID" \
            --access-key-secret "$ALIYUN_ACCESS_KEY_SECRET" \
            --region "$ALIYUN_REGION"

          # 使用文件方式上传（避免参数过长）
          aliyun fc PUT \
            /functions/${FC_FUNCTION_NAME}/code \
            --header "Content-Type=application/zip" \
            --body-file "fc-deploy-package.zip" \
            --region "$ALIYUN_REGION"

          echo "✅ Deploy completed!"

      - name: Clean up
        if: always()
        run: rm -rf fc-deploy fc-deploy-package.zip
